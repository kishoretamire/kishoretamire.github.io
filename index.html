<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online text case converter tool. Convert text to uppercase, lowercase, title case, sentence case, and more.">
    <title>Case Converter - Professional Text Case Conversion Tool</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=your-client-id" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="/">Case Converter</a>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about.html">About</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/privacy-policy.html">Privacy Policy</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Case Converter Tool</h1>
            <div class="converter-box">
                <textarea id="inputText" placeholder="Enter or paste your text here..."></textarea>
                <div class="button-group">
                    <button onclick="convertCase('lower')">lowercase</button>
                    <button onclick="convertCase('upper')">UPPERCASE</button>
                    <button onclick="convertCase('title')">Title Case</button>
                    <button onclick="convertCase('sentence')">Sentence case</button>
                    <button onclick="convertCase('alternate')">aLtErNaTe CaSe</button>
                    <button onclick="clearText()">Clear</button>
                    <button onclick="pasteText()">Paste</button>
                </div>
                <div class="stats">
                    <span>Characters: <span id="charCount">0</span></span>
                    <span>Words: <span id="wordCount">0</span></span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Case Converter</h3>
                <p>A free online tool to convert text case</p>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>
                <ul>
                    <li><a href="/about.html">About</a></li>
                    <li><a href="/contact.html">Contact</a></li>
                    <li><a href="/privacy-policy.html">Privacy Policy</a></li>
                    <li><a href="/terms.html">Terms of Service</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 Case Converter. All rights reserved.</p>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
