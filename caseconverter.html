<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
        }
        header, footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
        header h1 {
            margin: 0;
        }
        .container {
            width: 60%;
            margin: 20px auto;
            text-align: center;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-bottom: 20px;
            padding: 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: vertical;
        }
        button {
            width: 150px;
            padding: 10px;
            margin: 5px;
            font-size: 16px;
            color: #fff;
            background-color: #5bc0de;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #46a6c9;
        }
        footer a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <h1>Case Converter</h1>
</header>

<div class="container">
    <h2>Convert Text to Different Cases</h2>
    <textarea id="textInput" placeholder="Type or paste your text here to convert case"></textarea>
    <div>
        <button onclick="pasteFromClipboard()">Paste</button>
        <button onclick="convertToUpper()">UPPER CASE</button>
        <button onclick="convertToLower()">lower case</button>
        <button onclick="convertToProper()">Proper Case</button>
        <button onclick="convertToSentence()">Sentence case</button>
        <button onclick="clearText()">Clear</button>
    </div>
</div>

<footer>
    <p>
        <a href="#">Privacy Policy</a> | 
        <a href="#">Sitemap</a>
    </p>
    <p>&copy; 2024 Case Converter. All rights reserved.</p>
</footer>

<script>
    async function pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById("textInput").value = text;
        } catch (err) {
            alert("Failed to read clipboard contents: " + err);
        }
    }

    function convertToUpper() {
        const text = document.getElementById("textInput").value;
        document.getElementById("textInput").value = text.toUpperCase();
    }

    function convertToLower() {
        const text = document.getElementById("textInput").value;
        document.getElementById("textInput").value = text.toLowerCase();
    }

    function convertToProper() {
        const text = document.getElementById("textInput").value;
        document.getElementById("textInput").value = text.replace(/\w\S*/g, (txt) => {
            return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
        });
    }

    function convertToSentence() {
        const text = document.getElementById("textInput").value;
        document.getElementById("textInput").value = text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
    }

    function clearText() {
        document.getElementById("textInput").value = "";
    }
</script>

</body>
</html>
